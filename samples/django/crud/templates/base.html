<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Django CRUD{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ee;
        --panel: #ffffff;
        --text: #1d1d1d;
        --muted: #6b6b6b;
        --accent: #c24f3f;
        --border: #e5e0d8;
      }
      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 20px 28px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .container {
        max-width: 900px;
        margin: 24px auto;
        padding: 0 20px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      }
      .btn {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-size: 14px;
      }
      .btn.secondary {
        background: transparent;
        color: var(--accent);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 10px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      .muted { color: var(--muted); }
      .error { color: #a11212; margin-bottom: 12px; }
      form.inline { display: inline; }
      input[type="text"], input[type="password"] {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      label { display: block; margin-top: 12px; }
    </style>
  </head>
  <body>
    <header>
      <strong>Django CRUD Sample</strong>
      {% if request.session.username %}
        <span class="muted">Signed in as {{ request.session.username }}</span>
        <a class="btn secondary" href="{% url 'logout' %}">Logout</a>
      {% endif %}
    </header>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
