{% extends "base.html" %}

{% block title %}User Form{% endblock %}

{% block content %}
  <div class="card">
    <h2>{% if mode == "edit" %}Edit{% else %}Create{% endif %} User</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label>
        Username
        <input type="text" name="username" value="{% if user %}{{ user.user.username }}{% endif %}" required />
      </label>
      <label>
        Email
        <input type="text" name="email" value="{% if user and user.user %}{{ user.user.email }}{% endif %}" />
      </label>
      <label>
        Display name
        <input type="text" name="display_name" value="{% if user %}{{ user.display_name }}{% endif %}" required />
      </label>
      <label>
        Age
        <input type="text" name="age" value="{% if user and user.age %}{{ user.age }}{% endif %}" />
      </label>
      <label>
        City
        <input type="text" name="city" value="{% if user %}{{ user.city }}{% endif %}" />
      </label>
      <label>
        Password{% if mode == "edit" %} (leave blank to keep){% endif %}
        <input type="password" name="password" value="" {% if mode == "create" %}required{% endif %} />
      </label>
      <div style="margin-top: 16px;">
        <button class="btn" type="submit">Save</button>
        <a class="btn secondary" href="{% url 'user_list' %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
