{% extends "base.html" %}

{% block title %}User Form{% endblock %}

{% block content %}
  <div class="card">
    <h2>{% if mode == "edit" %}Edit{% else %}Create{% endif %} User</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label>
        Name
        <input type="text" name="name" value="{% if user %}{{ user.name }}{% endif %}" required />
      </label>
      <label>
        Password
        <input type="password" name="password" value="{% if user %}{{ user.password }}{% endif %}" required />
      </label>
      <div style="margin-top: 16px;">
        <button class="btn" type="submit">Save</button>
        <a class="btn secondary" href="{% url 'user_list' %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
