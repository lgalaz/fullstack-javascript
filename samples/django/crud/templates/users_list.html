{% extends "base.html" %}

{% block title %}Users{% endblock %}

{% block content %}
  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>Users</h2>
      <a class="btn" href="{% url 'user_create' %}">Add User</a>
    </div>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Password</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
          <tr>
            <td>{{ user.name }}</td>
            <td class="muted">{{ user.password }}</td>
            <td>
              <a class="btn secondary" href="{% url 'user_edit' user.id %}">Edit</a>
              <form class="inline" method="post" action="{% url 'user_delete' user.id %}">
                {% csrf_token %}
                <button class="btn secondary" type="submit">Delete</button>
              </form>
            </td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="3" class="muted">No users yet.</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
