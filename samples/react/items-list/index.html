<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Items List (CDN)</title>
    <style>
      :root {
        font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
        color: #1b1b1b;
        background: #f4f2ef;
      }

      body {
        margin: 0;
        padding: 0;
      }

      .app {
        max-width: 720px;
        margin: 48px auto;
        padding: 32px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid #ececec;
      }

      .empty {
        text-align: center;
        color: #7b7b7b;
        padding: 20px 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React, { useEffect, useState } from 'https://esm.sh/react@18';
      import { createRoot } from 'https://esm.sh/react-dom@18/client';

      function App() {
        const [users, setUsers] = useState([]);
        const [status, setStatus] = useState('loading');

        useEffect(() => {
          fetch('./data/users.json')
            .then((res) => res.json())
            .then((data) => {
              setUsers(data);
              setStatus('ready');
            })
            .catch(() => setStatus('error'));
        }, []);

        return (
          React.createElement('div', { className: 'app' },
            React.createElement('h1', null, 'Users List'),
            status === 'error'
              ? React.createElement('p', null, 'Failed to load users.')
              : React.createElement(
                  'table',
                  null,
                  React.createElement(
                    'thead',
                    null,
                    React.createElement('tr', null,
                      React.createElement('th', null, 'ID'),
                      React.createElement('th', null, 'Name')
                    )
                  ),
                  React.createElement(
                    'tbody',
                    null,
                    users.length === 0 && status === 'ready'
                      ? React.createElement('tr', null,
                          React.createElement('td', { colSpan: 2, className: 'empty' }, 'No users found.')
                        )
                      : users.map((user) =>
                          React.createElement('tr', { key: user.id },
                            React.createElement('td', null, user.id),
                            React.createElement('td', null, user.name)
                          )
                        )
                  )
                )
          )
        );
      }

      const root = createRoot(document.getElementById('root'));
      root.render(React.createElement(App));
    </script>
  </body>
</html>
